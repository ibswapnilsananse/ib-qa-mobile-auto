name: Where Is My Train - Android Tests

on:
  workflow_dispatch:
    inputs:
      test_provider:
        description: "Test provider: local | headspin | browserstack"
        required: false
        default: local
        type: choice
        options: [local, headspin, browserstack]
      platform_version:
        description: Android platform version
        required: false
        default: "12"
      device_name:
        description: Device name / AVD profile
        required: false
        default: Pixel_6
      udid:
        description: Device UDID (emulator-5554 for local, device serial for HeadSpin)
        required: false
        default: emulator-5554
      full_reset:
        description: Full reset before session (installs APK fresh)
        required: false
        default: "true"
      implicitly_wait:
        description: Implicit wait in ms
        required: false
        default: "2000"
      jira_project_key:
        description: Jira project key for Xray reporting
        required: false
        default: MYY
      jira_test_execution_key:
        description: "Jira Test Execution key to update (e.g. MYY-10). Leave empty to skip Xray upload."
        required: false
        default: ""
      report_type:
        description: "Report type: summary | detailed"
        required: false
        default: summary
        type: choice
        options: [summary, detailed]
      report_title:
        description: "Report title shown in the HTML report and email subject"
        required: false
        default: "IB-QA Mobile Automation — Where Is My Train"

jobs:
  android-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      TEST_PROVIDER: ${{ inputs.test_provider || 'local' }}
      PLATFORM_NAME: android
      PLATFORM_VERSION: ${{ inputs.platform_version || '12' }}
      DEVICE_NAME: ${{ inputs.device_name || 'Pixel_6' }}
      UDID: ${{ inputs.udid || 'emulator-5554' }}
      APP_PACKAGE: com.whereismytrain.android
      APP_ACTIVITY: com.whereismytrain.view.activities.HomeActivity
      APK_FILE_PATH: app/whereismytrain.apk
      FULL_RESET: ${{ inputs.full_reset || 'true' }}
      AUTO_LAUNCH_APPIUM_SERVER: ${{ (inputs.test_provider == 'local' || inputs.test_provider == '') && 'true' || 'false' }}
      IMPLICITLY_WAIT: ${{ inputs.implicitly_wait || '2000' }}
      JIRA_PROJECT_KEY: ${{ inputs.jira_project_key || 'MYY' }}
      HEADSPIN_API_TOKEN: ${{ secrets.HEADSPIN_API_TOKEN }}
      HEADSPIN_HOST: ${{ secrets.HEADSPIN_HOST }}
      BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
      BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
      BROWSERSTACK_APP_URL: ${{ secrets.BROWSERSTACK_APP_URL }}
      XRAY_BASE_URL: ${{ secrets.XRAY_BASE_URL }}
      XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
      XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_TEST_EXECUTION_KEY: ${{ inputs.jira_test_execution_key || secrets.JIRA_TEST_EXECUTION_KEY }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      REPORT_TYPE: ${{ inputs.report_type || 'summary' }}
      REPORT_TITLE: ${{ inputs.report_title || 'IB-QA Mobile Automation — Where Is My Train' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean previous test reports
        run: rm -rf mochawesome-report xray-report.json xray-execution-info.json email-body.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Enable KVM for hardware acceleration
        if: env.TEST_PROVIDER == 'local'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK
        if: env.TEST_PROVIDER == 'local'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & tools
        if: env.TEST_PROVIDER == 'local'
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator"

      - name: Cache Android AVD
        if: env.TEST_PROVIDER == 'local'
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-${{ runner.os }}-v1
          restore-keys: avd-api34-${{ runner.os }}

      - name: Create Android AVD
        if: env.TEST_PROVIDER == 'local' && steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          echo "no" | avdmanager create avd \
            --name Pixel_6 \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      - name: Clean previous test reports
        if: always()
        run: |
          echo "🧹 Removing mochawesome-report directory and stale xray files..."
          rm -rf mochawesome-report
          rm -f xray-report.json xray-execution-info.json
          echo "✅ Clean complete. Workspace is fresh for this run."

      - name: Run Where Is My Train tests (local emulator)
        if: env.TEST_PROVIDER == 'local'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          force-avd-creation: false
          emulator-boot-timeout: 900
          script: |
            rm -rf mochawesome-report allure-results allure-report allure-single xray-report.json xray-execution-info.json
            npm install -g appium allure-commandline
            appium driver install uiautomator2
            adb shell input keyevent 82
            npm run test:singleWithMulti "Where Is My Train - Test Suite"

      - name: Run Where Is My Train tests (remote provider)
        if: env.TEST_PROVIDER != 'local'
        run: |
          rm -rf mochawesome-report allure-results allure-report allure-single xray-report.json xray-execution-info.json
          npm run test:singleWithMulti "Where Is My Train - Test Suite"

      - name: Generate Allure single-page report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o allure-report
            pip install allure-combine --quiet
            allure-combine allure-report --dest allure-single --auto-create-folders
            echo "✅ Allure single-page report generated"
          else
            echo "⚠ No allure-results found, skipping allure report"
          fi

      - name: Upload Allure single-page report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-single-page-report
          path: allure-single/complete.html
          retention-days: 7

      - name: Check mochawesome report exists
        id: check_report
        if: always() && env.JIRA_TEST_EXECUTION_KEY != ''
        run: |
          if [ -f "mochawesome-report/mochawesome.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠ mochawesome.json not found, skipping Xray upload"
          fi

      - name: Generate Xray report from Mochawesome results
        if: always() && env.JIRA_TEST_EXECUTION_KEY != '' && steps.check_report.outputs.exists == 'true'
        run: npm run xray:generate

      - name: Upload results to Jira Xray
        if: always() && env.JIRA_TEST_EXECUTION_KEY != '' && steps.check_report.outputs.exists == 'true'
        run: npm run xray:upload

      - name: Upload Xray report JSON
        uses: actions/upload-artifact@v4
        if: always() && env.JIRA_TEST_EXECUTION_KEY != '' && steps.check_report.outputs.exists == 'true'
        with:
          name: xray-report
          path: |
            xray-report.json
            xray-execution-info.json
          retention-days: 3

      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mochawesome-report
          path: mochawesome-report/
          retention-days: 3

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-screenshots
          path: report/failure_screenshots/
          retention-days: 3

      - name: Upload execution logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-logs
          path: report/execution-*.log
          retention-days: 2

      - name: Upload Appium server logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-server-logs
          path: report/appium_server_logs/
          retention-days: 2

      - name: Generate HTML summary report
        id: gen_report
        if: always()
        run: |
          if [ -f "mochawesome-report/mochawesome.json" ]; then
            if [ "${{ env.REPORT_TYPE }}" == "detailed" ]; then
              npm run report:generate:detailed -- --report-title "${{ env.REPORT_TITLE }}"
            else
              npm run report:generate -- --report-title "${{ env.REPORT_TITLE }}"
            fi
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠ mochawesome.json not found, skipping HTML report generation"
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload HTML summary report
        uses: actions/upload-artifact@v4
        if: always() && steps.gen_report.outputs.report_exists == 'true'
        with:
          name: ib-qa-test-summary-report
          path: mochawesome-report/ib-qa-test-summary.html
          retention-days: 2

      - name: Prepare email HTML body
        id: prepare_email
        if: always()
        run: npm run email:prepare

      - name: Create test artifacts zip
        if: always()
        run: |
          zip -j ib-qa-wimt-results.zip \
            mochawesome-report/mochawesome.json \
            mochawesome-report/ib-qa-test-summary.html \
            xray-report.json \
            xray-execution-info.json 2>/dev/null || \
          zip -j ib-qa-wimt-results.zip \
            mochawesome-report/mochawesome.json 2>/dev/null || \
          echo "⚠ No result files to zip"

      - name: Send email notification
        if: always() && env.GMAIL_USERNAME != '' && env.NOTIFICATION_EMAIL != ''
        shell: pwsh
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMTP_TO: ${{ secrets.NOTIFICATION_EMAIL }}
          RUN_NUMBER: ${{ github.run_number }}
          REPORT_TITLE: ${{ env.REPORT_TITLE }}
        run: |
          $smtpServer   = "smtp.gmail.com"
          $smtpPort     = 587
          $smtpUser     = $env:GMAIL_USER
          $smtpPass     = $env:GMAIL_APP_PASS
          $smtpFrom     = "IB-QA Automation <$smtpUser>"
          $smtpTo       = $env:SMTP_TO
          $subject      = "IB-QA Mobile | Where Is My Train | $($env:REPORT_TITLE) - Run #$($env:RUN_NUMBER)"

          $emailBodyPath = "email-body.html"
          if (Test-Path $emailBodyPath) {
            $body = Get-Content -Path $emailBodyPath -Raw
          } else {
            $body = "<p>Test run #$($env:RUN_NUMBER) completed. See attached report for details.</p>"
          }

          try {
            $smtp = New-Object Net.Mail.SmtpClient($smtpServer, $smtpPort)
            $smtp.EnableSsl = $true
            $smtp.Credentials = New-Object System.Net.NetworkCredential($smtpUser, $smtpPass)

            $message = New-Object Net.Mail.MailMessage
            $message.From = $smtpFrom
            $smtpTo -split ',' | ForEach-Object { $message.To.Add($_.Trim()) }
            $message.Subject = $subject
            $message.Body = $body
            $message.IsBodyHTML = $true

            foreach ($f in @("ib-qa-wimt-results.zip", "mochawesome-report/ib-qa-test-summary.html", "allure-single/complete.html")) {
              if (Test-Path $f) {
                $message.Attachments.Add((New-Object System.Net.Mail.Attachment($f)))
              }
            }

            $smtp.Send($message)
            Write-Host "✅ Email notification sent successfully."
          } catch {
            Write-Host "##[error] Failed to send email: $_"
            exit 1
          }
