name: Static Code Analysis

on:
  push:
    branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]

permissions:
  contents: read
  actions: write

jobs:
  sca:
    name: TypeScript SCA (type-check + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run build

      - name: ESLint analysis
        run: npm run lint

      - name: Generate ESLint JSON report
        if: always()
        run: npm run lint:report

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 7

  trigger-contacts-tests:
    name: Trigger Contacts App Tests
    needs: sca
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Contacts App workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'contacts-tests.yml',
              ref: context.ref,
              inputs: {
                test_provider: 'local'
              }
            });
            console.log(`Triggered contacts-tests.yml on ref: ${context.ref}`);
