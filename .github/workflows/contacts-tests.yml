name: Contacts App - Android Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PLATFORM_NAME: android
      PLATFORM_VERSION: "12"
      DEVICE_NAME: Pixel_6
      UDID: emulator-5554
      APP_PACKAGE: com.google.android.dialer
      APP_ACTIVITY: com.google.android.dialer.extensions.GoogleDialtactsActivity
      APK_FILE_PATH: ""
      FULL_RESET: "false"
      AUTO_LAUNCH_APPIUM_SERVER: "true"
      IMPLICITLY_WAIT: "2000"
      JIRA_PROJECT_KEY: MYY

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & tools
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator"

      - name: Cache Android AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-${{ runner.os }}-v1

      - name: Create Android AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          echo "no" | avdmanager create avd \
            --name Pixel_6 \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      - name: Run Contacts tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            npm install -g appium
            appium driver install uiautomator2
            adb shell input keyevent 82
            npm run test:singleWithMochaAwesome "Contacts App Test Suite"

      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mochawesome-report
          path: mochawesome-report/
          retention-days: 14

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-screenshots
          path: report/failure_screenshots/
          retention-days: 14

      - name: Upload Appium server logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-server-logs
          path: report/appium_server_logs/
          retention-days: 7
